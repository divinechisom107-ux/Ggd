<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* 1. THE BACKGROUND SETTINGS */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-background {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 450px;
            perspective: 1000px;
        }

        /* 2. SEARCH PAGE STYLING */
        #search-page {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .logo-area i { color: #d9534f; margin-bottom: 10px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 25px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #d9534f; }

        .btn-track {
            width: 100%;
            padding: 15px;
            background: #d9534f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-track:hover { background: #c9302c; }

        /* 3. RESULT PAGE STYLING */
        #result-page {
            display: none;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { background: #d9534f; color: white; padding: 25px; text-align: center; }
        
        /* PROFILE PICTURE STYLING */
        .profile-area {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d9534f;
            margin-bottom: 10px;
        }

        .info-list { padding: 10px 0; }
        
        .info-row {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #f0f0f0;
            gap: 20px;
        }

        .info-row i { color: #d9534f; width: 25px; font-size: 20px; text-align: center; }
        .label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .value { display: block; font-weight: 600; font-size: 16px; color: #333; }

        .btn-back {
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border: none;
            color: #666;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="hero-background">
    <div class="container">
        <div id="search-page">
            <div class="logo-area">
                <i class="fa-solid fa-truck-plane fa-4x"></i>
                <h2>Global Logistic Tracking</h2>
                <p style="color: #666;">Fast, Secure & Reliable Delivery</p>
            </div>
            <input type="text" id="trackInput" placeholder="Enter Tracking Number...">
            <button class="btn-track" onclick="showResult()">TRACK NOW</button>
        </div>

        <div id="result-page">
            <div class="header">
                <i class="fa-solid fa-circle-check fa-3x" style="margin-bottom: 10px;"></i>
                <h3>Shipment Located</h3>
                <p id="display-id" style="opacity: 0.9;"></p>
            </div>
            
            <div class="profile-area">
                <img src="https://i.imgur.com/LikXk2x.jpeg" class="profile-pic" alt="Shipper Photo">
                <div><span class="label">Primary Shipper</span><span class="value">Kaley Cuoco</span></div>
            </div>

            <div class="info-list">
                <div class="info-row">
                    <i class="fa-solid fa-box"></i>
                    <div><span class="label">Goods Type</span><span class="value">One hundred thousand euros</span></div>
                </div>
                <div class="info-row">
                    <i class="fa-solid fa-weight-scale"></i>
                    <div><span class="label">Weight</span><span class="value">10.00 kg</span></div>
                </div>
                <div class="info-row">
                    <i class="fa-solid fa-user-tie"></i>
                    <div><span class="label">Shipper</span><span class="value">Kaley Cuoco</span></div>
                </div>
                <div class="info-row">
                    <i class="fa-solid fa-plane-departure"></i>
                    <div><span class="label">Status</span><span class="value">In Transit - Airport Hub</span></div>
                </div>
            </div>
            <button class="btn-back" onclick="location.reload()">NEW SEARCH</button>
        </div>
    </div>
</div>

<script>
    function showResult() {
        var val = document.getElementById('trackInput').value;
        if (val.trim() === "") {
            alert("Please enter a valid tracking number.");
            return;
        }
        document.getElementById('search-page').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('display-id').innerText = "Tracking ID: " + val;
    }
</script>

</body>
</html>
